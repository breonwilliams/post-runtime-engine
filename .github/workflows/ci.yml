# CI for Promptless CPT Pages.
#
# Three jobs, all required:
#   lint  — php -l every PHP file across the supported version range, plus
#           a syntax check of the MCP connector JS.
#   test  — the PHPUnit Unit suite (validator/registry/renderer contract
#           tests — the closed enums, error codes, and merge_defaults
#           behavior that every write surface depends on).
#   build — runs the release packaging script, which self-verifies the
#           ZIP's internal structure (the post-theme-v1.2.5-incident
#           guard). A flattened or incomplete archive fails the build
#           here instead of on a customer's site.
#
# The Integration suite needs a WordPress test install (see
# bin/install-wp-tests.sh) and is not wired here yet — add a wp-env or
# wordpress-develop service when integration coverage grows.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['7.4', '8.2']
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: PHP syntax check (all plugin files)
        run: |
          set -e
          find . -name '*.php' -not -path './vendor/*' -not -path './build/*' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null
          echo "All PHP files lint clean on PHP ${{ matrix.php }}"
      - name: MCP connector JS syntax check
        run: node --check includes/Connector/assets/post-runtime-connector.js

  test:
    runs-on: ubuntu-latest
    strategy:
      # Run every PHP version even if one fails — a 7.4-only failure and an
      # 8.2-only failure are different bugs; canceling half the matrix hides
      # one of them (CI run #1 did exactly that).
      fail-fast: false
      matrix:
        php: ['7.4', '8.2']
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer
      # `composer update`, NOT `composer install`: the committed lock file is
      # generated on the dev machine's PHP (8.4) and pins packages that hard-
      # require it (doctrine/instantiator 2.x needs ^8.4), so installing the
      # lock on the 7.4/8.2 matrix legs refuses outright — CI run #1 failed
      # before executing a single test. Resolving per-leg gives each PHP
      # version a compatible dependency set (7.4 gets instantiator 1.x); the
      # code under test is the plugin, not the dev dependencies, so lock-file
      # reproducibility matters less than actually running the suite.
      - name: Resolve dev dependencies for this PHP version
        run: composer update --no-interaction --prefer-dist
      - name: Run Unit suite
        run: composer run test:unit

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build release ZIP (self-verifying)
        run: ./bin/build-release.sh
      - name: Confirm artifact exists
        run: test -f build/promptless-cpt-pages.zip && unzip -l build/promptless-cpt-pages.zip | tail -3
